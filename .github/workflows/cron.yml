name: Trigger Scheduled Posts

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit cron endpoint
        run: |
          STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X GET "https://stocktwits-video-admin.vercel.app/api/cron/fire" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $STATUS"
          cat /tmp/response.txt
          if [ "$STATUS" -ge 400 ]; then
            echo "Cron endpoint returned error: $STATUS"
            exit 1
          fi
