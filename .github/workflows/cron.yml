name: Trigger Scheduled Posts

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit cron endpoint
        run: |
          curl -f -X GET https://${{ secrets.VERCEL_APP_URL }}/api/cron/fire \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
